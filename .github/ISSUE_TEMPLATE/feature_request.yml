name: Feature request
description: Propose a Monad feature
title: "feat: "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Monad do?
    validations:
      required: true
  - type: textarea
    id: governance
    attributes:
      label: Governance impact
      description: Does this affect policies, domains, lifecycle, work packets, or release gates?
