name: Release Dry Run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-check:
    name: Release check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: scripts/release-check.sh
