schema_version = 1
environment = "dev"

[contract]
purpose = "Local development"
destructive_operations_allowed = true
real_customer_data_allowed = false
debug_logging_allowed = true
requires_secret_store = false
requires_policy_check_before_release = false

[services]
postgres = { required = false, port = 5432 }
keycloak = { required = false, port = 8080 }
meilisearch = { required = false, port = 7700 }
mailpit = { required = false, smtp_port = 1025, ui_port = 8025 }
valkey = { required = false, port = 6379 }
grafana = { required = false, port = 3001 }
prometheus = { required = false, port = 9090 }
