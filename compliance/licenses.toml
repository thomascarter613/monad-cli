# License governance across ecosystems.

[policy]
unknown_licenses = "deny"
copyleft_review_required = true
license_changes_require_review = true

[allowed]
licenses = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0"
]

[review_required]
licenses = [
  "LGPL-2.1",
  "LGPL-3.0",
  "GPL-2.0",
  "GPL-3.0",
  "AGPL-3.0"
]

[registries]
rust = ["https://crates.io"]
javascript = ["https://registry.npmjs.org"]
docker = [
  "docker.io",
  "ghcr.io",
  "quay.io"
]
